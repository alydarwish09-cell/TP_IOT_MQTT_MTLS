# Configuration mTLS pour Mosquitto
listener 8883

# Chemins vers les certificats (à adapter selon votre installation)
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/broker.crt
keyfile /etc/mosquitto/certs/broker.key

# Exiger l'authentification mutuelle
require_certificate true

# Utiliser le Common Name (CN) du certificat comme nom d'utilisateur
use_identity_as_username true
